---
{{ include "common.configMap" (dict "top" . "overrides" "listener-base.configMap") }}

{{- define "listener-base.configMap" }}
{{- $top := .top }}
{{- with .top.Values.listenerBase }}
metadata:
  labels:
    {{- include "listener-base.labels" $top | nindent 4 }}
  {{- with $top.Values.additionalAnnotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ tpl ($value | toString) $top | quote }}
    {{- end }}
  {{- end }}
data:
  CA_CERT: "{{ .caCert }}"
  CA_CERT_FILE: "{{ .caCertFile }}"
  DEBUG_LEVEL: "{{ .debugLevel }}"
  ENVIRONMENT: "{{ .environment }}"
  LDAP_BASE_DN: "{{ .ldapBaseDn }}"
  LDAP_PASSWORD: "{{ .ldapPassword }}"
  LDAP_PASSWORD_FILE: "{{ .ldapPasswordFile }}"
  LDAP_HOST: "{{ .ldapHost }}"
  LDAP_HOST_DN: "{{ .ldapHostDn }}"
  LDAP_PORT: "{{ .ldapPort }}"
  NOTIFIER_SERVER: "{{ default .ldapHost .notifierServer }}"
  TLS_MODE: "{{ .tlsMode }}"
{{ end }}
{{ end }}
...
